<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raymarching Shader + Performance</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="glcanvas"></canvas>
    <div class="info">✦ raymarching · 3 bounces · <span>drag to orbit</span></div>
    <div id="perf">
      <div><span class="label">FPS</span> <span class="value" id="fps">--</span></div>
      <div><span class="label">frame</span> <span class="value" id="frametime">--</span><span class="dim"> ms</span></div>
      <div><span class="label">res</span> <span class="value" id="resolution">--</span></div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
