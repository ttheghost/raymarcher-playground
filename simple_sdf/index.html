<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raymarching Shader + Performance</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="top-bar">
    <h1>✦ Raymarching Editor</h1>
    <div class="stats">
      <span id="fpsDisplay">60</span> FPS ·
      <span id="entityCountDisplay">0</span> entities
    </div>
  </div>

  <div class="main-layout">
    <!-- Viewport -->
    <div class="viewport">
      <canvas id="glcanvas"></canvas>
      <div class="viewport-overlay">🖱 drag to orbit · scroll to zoom</div>
    </div>

    <!-- Editor Panel -->
    <div class="editor-panel">
      <div class="panel-header">
        <h2>Scene Entities</h2>
        <span class="entity-count" id="entityCount">0 entities</span>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th style="width:20px;">#</th>
              <th style="width:60px;">Type</th>
              <th>Rot</th>
              <th>Pos</th>
              <th>Scale</th>
              <th>Color</th>
              <th style="width:40px;">S</th>
              <th style="width:40px;">M</th>
              <th style="width:60px;">Actions</th>
            </tr>
          </thead>
          <tbody id="entityTableBody">
            <!-- Rows rendered by JS -->
          </tbody>
        </table>
      </div>

      <!-- Add Entity Form -->
      <div class="add-form">
        <div class="add-form-row">
          <select id="addType" class="entity-select" style="flex:0 0 80px;">
            <option value="0">Sphere</option>
            <option value="1">Box</option>
            <option value="2">Plane</option>
            <option value="3">Torus</option>
          </select>
          <input type="number" id="addrX" class="entity-input-sm" value="0" step="0.1" placeholder="rx" />
          <input type="number" id="addrY" class="entity-input-sm" value="0" step="0.1" placeholder="ry" />
          <input type="number" id="addrZ" class="entity-input-sm" value="0" step="0.1" placeholder="rz" />
          <input type="number" id="addpX" class="entity-input-sm" value="0" step="0.1" placeholder="px" />
          <input type="number" id="addpY" class="entity-input-sm" value="0" step="0.1" placeholder="py" />
          <input type="number" id="addpZ" class="entity-input-sm" value="0" step="0.1" placeholder="pz" />
          <input type="number" id="addsX" class="entity-input-sm" value="1" step="0.1" placeholder="sx" />
          <input type="number" id="addsY" class="entity-input-sm" value="1" step="0.1" placeholder="sy" />
          <input type="number" id="addsZ" class="entity-input-sm" value="1" step="0.1" placeholder="sz" />
          <input type="color" id="addColor" class="color-picker" value="#ff6b6b" />
          <input type="number" id="addRoughness" class="entity-input-sm" value="0.1" step="0.05" placeholder="Rough" />
          <input type="number" id="addMetallic" class="entity-input-sm" value="0.5" step="0.05" placeholder="Met" />
          <button class="btn btn-primary" onclick="addEntity()">+ Add</button>
        </div>
      </div>
    </div>
  </div>

  <div id="perf" style="display: none;">
    <div><span class="label">FPS</span> <span class="value" id="fps">--</span></div>
    <div><span class="label">frame</span> <span class="value" id="frametime">--</span><span class="dim"> ms</span></div>
    <div><span class="label">res</span> <span class="value" id="resolution">--</span></div>
  </div>

  <script type="importmap">
        {
            "imports": {
                "./entities.js": "./entities.js"
            }
        }
    </script>

  <script type="module" src="script.js"></script>
</body>

</html>
